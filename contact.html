<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="icon" type="x-icon" href="images/20230528_2212535555-removebg-preview.png">
    <link rel="stylesheet" href="contact.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body class="font-[poppins] font-extrabold">
    <header>
        <nav
            class="flex justify-between items-center w-full mx-auto px-4 sm:px-12 md:px-14 lg:px-12 xl:px-[12%] py-2 2xl:py-3">
            <div>
                <a href="index.html"><img class="w-12 rounded-full"
                        src="images/20230528_2212535555-removebg-preview.png" alt="img"></a>
            </div>
            <div
                class="navbar md:static absolute md:h-fit h-[100vh] left-0 top-[-1000%] md:w-auto w-full flex items-center justify-center px-5 z-40">
                <ul class="nav-list flex md:flex-row flex-col md:items-center text-center md:gap-[3vw] gap-8">
                    <li><a class="nav-links font-semibold transition-all duration-200" href="index.html">Home</a></li>
                    <li><a class="nav-links font-semibold transition-all duration-200" href="index.html">About</a></li>
                    <li><a class="nav-links font-semibold transition-all duration-200" href="index.html">Project</a>
                    </li>
                    <li><a class="nav-links font-semibold transition-all duration-200" href="index.html">Service</a>
                    </li>
                    </li>
                </ul>
            </div>
            <div class="flex items-center justify-center gap-4">
                <div class="modes flex items-center justify-center text-3xl p-1 cursor-pointer">
                    <ion-icon id="theme" name="moon-sharp"></ion-icon>
                </div>
                <ion-icon onclick="onToggleMenu(this)" class="nav-btn text-3xl p-1 cursor-pointer z-50 md:hidden"
                    name="menu-sharp"></ion-icon>
            </div>
        </nav>
    </header>
    <main class="w-full px-4 sm:px-12 md:px-14 lg:px-12 xl:px-[12%]">
        <section class="block text-[2rem] sm:text-[2.5rem] my-[8%] sm:my-[4%]">
            <h1>
                Contact <span class="text-[#78C1F3]">Me</span>
            </h1>
        </section>
        <section class="flex items-center justify-center flex-wrap w-full">
            <div class="contact-img w-auto sm:w-[50%] mx-auto order-2" data-aos="zoom-in" data-aos-once="false"
                data-aos-offset="150" data-aos-delay="20" data-aos-duration="800">
                <img class="inline-block float-right" src="images/sammy-service-support-456x456.png" alt="" srcset="">
            </div>
            <div class="inline-block w-auto sm:w-[50%] mx-auto order-1" data-aos="zoom-in" data-aos-once="false"
                data-aos-offset="150" data-aos-delay="20" data-aos-duration="800">
                <form class="md:w-[95%]" action="index.html">
                    <input type="text" name="name" id="user-name" placeholder="Your Name*" autocomplete="off" required>
                    <input type="email" name="email" id="user-email" placeholder="Your Email*" autocomplete="off"
                        required>
                    <textarea name="details" id="user-query" cols="5" rows="5" placeholder="How Can I help you?*"
                        required></textarea>
                    <button class="submit-btn px-6 py-2 transition-all duration-500 text-[18px]"
                        type="submit">Submit</button>
                </form>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init(
            duration = 500
        );
    </script>
</body>

</html>
